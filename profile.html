<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Profile</title>
        <link rel="stylesheet" href="./css/general.css" />
        <link rel="stylesheet" href="./css/component.css" />
        <link rel="stylesheet" href="./css/profile-style.css" />
    </head>
    <body>
        <header>
            <h1>Quiz App</h1>
        </header>
        <main>
            <section class="profile-section">
                <div class="info-container">
                    <img src="./assets/profile.png" alt="My Pic" />
                    <h1>Gimena</h1>
                </div>
                <h4>About Me:</h4>
                <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Aliquam, soluta aperiam dicta sint earum nulla quam quaerat
                    maxime omnis quasi asperiores iusto dolore ad ut,
                    consequuntur quis accusantium hic amet?
                </p>
                <section class="counter-section">
                    <div class="counter-container">
                        <img src="./assets/question.png" alt="" />
                        <p>12</p>
                    </div>
                    <div class="counter-container">
                        <img src="./assets/bookmark_filled.png" alt="" />
                        <p>4</p>
                    </div>
                </section>
            </section>

            <section class="setting-section">
                <h3>Settings</h3>
                <h4>Dark Mode</h4>
                <label class="switch">
                    <input type="checkbox" />
                    <span class="slider round"></span>
                </label>
            </section>
        </main>
        <nav>
            <a href="home.html" rel="noopener noreferrer"
                ><img src="./assets/home.png" alt=""
            /></a>
            <a href="bookmark.html" rel="noopener noreferrer"
                ><img src="./assets/bookmark_transparent.png" alt="bookmark"
            /></a>
            <a href="form.html" rel="noopener noreferrer"
                ><img src="./assets/add.png" alt="add"
            /></a>
            <img
                class="nav-selected"
                src="./assets/profile_filled.png"
                alt="profile selected"
            />
        </nav>
    </body>
</html>
